<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Antonius</title>

    <link rel="stylesheet" href="css/tree.css">
</head>

<body>

<div id="tree-page">

    <aside id="side-panel">

        <h1>The House of the Family Antonius</h1>
        <br>
        <img    src="images/background/emblem.png"
                alt="Antonius Family Emblem"
                class="family-emblem">
        <h2>Family Tree</h2>
        <p>
            <br>
            Click and drag to explore the tree.
            <br>
            <br>
            <br>
            Mousewheel to zoom in and out.
            <br>
            <br>
            <br>
            Click an individual portrait to get more info and read that persons journal entry.
            <br>
            <br>
            <br>
            <br>
            <a href="home.html" class="home-btn">Return</a>
        </p>
    </aside>

    <!-- === TREE VIEW === -->
    <main id="tree-viewport">

        <div id="tree-canvas">

            <svg id="tree-lines"></svg>

            <!-- === MARCUS & FULVIA TREE === -->
            <div
                class="branch-container"
                style="top:200px;">

                <!-- === MARCUS === -->
                <div 
                    class="tree-marcus-card"
                    data-id="marcus"
                    style="top:0px;">
                </div>

                <!-- === FULVIA === -->
                <div
                    class="tree-wife-card"
                    data-id="fulvia"
                    data-connect="wife"
                    data-auto="children"
                    style="left:1200px; top:0px;">
                </div>

            <!-- === IULLUS BRANCH === -->
                <div
                    class="sub-branch-container"
                    data-id="iullus-branch"
                    data-parent="fulvia"
                    style="top:100px;">

                    <!-- === AEMILIA === -->
                    <div
                        class="tree-child-card"
                        data-id="aemilia"
                        data-partner-side="left"
                        style="top:200px;">
                    </div>

                    <!-- === IULLUS === -->
                    <div
                        class="tree-child-card"
                        data-id="iullus"
                        data-line-parent="fulvia"
                        data-auto="children"
                        style="top:200px;">
                    </div>

                        <!-- === ALESSANDRO === -->
                        <div
                            class="tree-child-card"
                            data-id="alessandro"
                            style="top:500px;">
                        </div>
                        
                        <!-- === JAIDEN === -->
                        <div
                            class="tree-child-card"
                            data-id="jaiden"
                            style="top:500px;">
                        </div>

                        <!-- === AURELIA BRANCH === -->
                        <div
                            class="sub-branch-container"
                            data-id="aurelia-branch"
                            style="left:60px; top:0px;">

                            <!-- === AURELIA === -->
                            <div
                                class="tree-child-card"
                                data-id="aurelia"
                                data-auto="children"
                                style="top:500px;">
                            </div>
                            
                            <!-- === KIERDYN === -->
                            <div
                                class="tree-child-card"
                                data-id="kierdyn"
                                style="top:800px;">
                            </div>
                                                        
                            <!-- === EBEN === -->
                            <div
                                class="tree-child-card"
                                data-id="eben"
                                style="top:800px;">
                            </div>
                        </div>
                </div>

            </div>

            <!-- === OCTAVIA THE YOUNGER TREE === -->
            <div
                class="branch-container"
                style="top:200px;">
                 
                <!-- === GAIUS JULIUS CAESAR === -->
                <div
                    class="tree-child-card"
                    data-id="caesar"
                    data-auto="children"
                    style="left:400px; top:-1400px;">
                </div>

                <!-- === JULIUS CAESAR === -->
                <div
                    class="tree-child-card"
                    data-id="julius"
                    style="left:600px; top:-1100px;">
                </div>

                <!-- === JULIA === -->
                <div
                    class="tree-child-card"
                    data-id="julia"
                    data-auto="children"
                    style="left:200px; top:-1100px;">
                </div>

                <!-- === ATIA === -->
                <div
                    class="tree-child-card"
                    data-id="atia"
                    data-auto="children"
                    style="left:200px; top:-800px;">
                </div>

                <!-- === OCTAVIAN === -->
                <div
                    class="tree-child-card"
                    data-id="octavian"
                    data-connect="child"
                    style="left:600px; top:-500px;">
                </div>

                <!-- === OCTAVIA THE YOUNGER === -->
                <div
                    class="tree-wife-card"
                    data-id="octavia"
                    data-connect="wife"
                    data-auto="children"
                    style="top:1px;">
                </div>

            <!-- === AIRIANA BRANCH === -->
                <div
                    class="sub-branch-container"
                    data-id="airiana-branch"
                    data-parent="octavia"
                    style="top:100px;">

                    <!-- === AIRIANA === -->
                    <div
                        class="tree-child-card"
                        data-id="airiana"
                        data-line-parent="octavia"
                        data-auto="children"
                        style="top:200px;">
                    </div>

                        <!-- === KALEB === -->
                        <div
                            class="tree-child-card"
                            data-id="kaleb"
                            style="top:500px;">
                        </div>

                </div>

                <!-- === ANTONIA BRANCH === -->
                <div
                    class="sub-branch-container"
                    data-id="antonia-branch"
                    data-parent="octavia"
                    style="top:100px;">

                    <!-- === ANTONIA === -->
                    <div
                        class="tree-child-card"
                        data-id="antonia"
                        data-line-parent="octavia"
                        data-auto="children"
                        style="top:200px;">
                    </div>

                    <!-- === NERO D === -->
                    <div
                        class="tree-child-card"
                        data-id="nerod"
                        style="top:0px;">
                    </div>

                    <!-- === FILIPA BRANCH === -->
                    <div
                        class="sub-branch-container"
                        data-id="filipa-branch"
                        data-parent="antonia,nerod"
                        style="top:0px; min-width:520px;">

                        <!-- === FILIPA === -->
                        <div
                            class="tree-child-card"
                            data-id="filipa"
                            data-auto="children"
                            style="top:500px;">
                        </div>

                        <!-- === TERITEQAS === -->
                        <div
                            class="tree-child-card"
                            data-id="teriteqas"
                            style="top:500px;">
                        </div>

                            <!-- === BLAY === -->
                            <div
                                class="tree-child-card"
                                data-id="blay"
                                style="top:800px;">
                            </div>
                    </div>

                    <!-- === DAMION BRANCH === -->
                    <div
                        class="sub-branch-container"
                        data-id="damion-branch"
                        data-parent="antonia,nerod"
                        style="top:0px; min-width:780px;">

                        <!-- === DAMION === -->
                        <div
                            class="tree-child-card"
                            data-id="damion"
                            data-auto="children"
                            style="top:500px;">
                        </div>

                            <!-- === NERO === -->
                            <div
                                class="tree-child-card"
                                data-id="nero"
                                style="top:800px;">
                            </div>

                            <!-- === SIDONIUS === -->
                            <div
                                class="tree-child-card"
                                data-id="sid"
                                style="top:800px;">
                            </div>

                            <!-- === CLAUDIUS === -->
                            <div
                                class="tree-child-card"
                                data-id="claudius"
                                style="top:800px;">
                            </div>
                    </div>
                </div>

            </div>

            <!-- === CLEOPATRA VII TREE === -->
            <div
                class="branch-container"
                style="top:200px;">

                <!-- === CLEOPATRA VII === -->
                <div
                    class="tree-wife-card"
                    data-id="cleopatra"
                    data-connect="wife"
                    data-auto="children"
                    style="top:0px;">
                </div>

                <!-- === HELIOS BRANCH === -->
                <div
                    class="sub-branch-container"
                    data-id="helios-branch"
                    data-parent="cleopatra"
                    style="top:100px;">

                    <!-- === HELIOS === -->
                    <div
                        class="tree-child-card"
                        data-id="helios"
                        data-line-parent="cleopatra"
                        data-auto="children"
                        style="top:200px;">
                    </div>

                        <!-- === Gamila === -->
                        <div
                            class="tree-child-card"
                            data-id="gamila"
                            data-auto="children"
                            style="top:500px;">
                        </div>

                        <!-- === DECIMUS === -->
                        <div
                            class="tree-child-card"
                            data-id="decimus"
                            data-partner-side="left"
                            style="top:500px;">
                        </div>

                            <!-- === ROSE === -->
                            <div
                                class="tree-child-card"
                                data-id="rose"
                                style="top:800px;">
                            </div>
                            
                            <!-- === FREDERICK === -->
                            <div
                                class="tree-child-card"
                                data-id="frederick"
                                style="top:800px;">
                            </div>
                                                    
                            <!-- === LHIANNON === -->
                            <div
                                class="tree-child-card"
                                data-id="lhiannon"
                                style="top:800px;">
                            </div>
                        
                        <!-- === GAGE === -->
                        <div
                            class="tree-child-card"
                            data-id="gage"
                            data-auto="children"
                            style="top:500px;">
                        </div>
                        
                            <!-- === VINCENT === -->
                            <div
                                class="tree-child-card"
                                data-id="vincent"
                                style="top:800px;">
                            </div>
                </div>

                <!-- === SELENE BRANCH === -->
                <div
                    class="sub-branch-container"
                    data-id="selene-branch"
                    data-parent="cleopatra"
                    style="top:100px;">

                    <!-- === SELENE === -->
                    <div
                        class="tree-child-card"
                        data-id="selene"
                        data-line-parent="cleopatra"
                        data-auto="children"
                        style="top:200px;">
                    </div>

                    <!-- === JUBA II === -->
                    <div
                        class="tree-child-card"
                        data-id="juba"
                        style="top:0px;">
                    </div>

                        <!-- === ZAREK === -->
                        <div
                            class="tree-child-card"
                            data-id="zarek"
                            data-auto="children"
                            style="top:500px;">
                        </div>

                            <!-- === JOSIAH === -->
                            <div
                                class="tree-child-card"
                                data-id="josiah"
                                style="top:800px;">
                            </div>
                        
                        <!-- === XAL === -->
                        <div
                            class="tree-child-card"
                            data-id="xal"
                            data-auto="children"
                            style="top:500px;">
                        </div>

                            <!-- === TAURUS === -->
                            <div
                                class="tree-child-card"
                                data-id="taurus"
                                style="top:800px;">
                            </div>
                        
                        <!-- === BATRESH === -->
                        <div
                            class="tree-child-card"
                            data-id="batresh"
                            style="top:500px;">
                        </div>
                        
                        <!-- === AMUN === -->
                        <div
                            class="tree-child-card"
                            data-id="amun"
                            style="top:0px;">
                        </div>
        </div>

    </main>

</div>

<div id="tree-modal" class="tree-modal" aria-hidden="true">
    <div class="tree-modal-backdrop" data-close-modal></div>

    <div class="tree-modal-card">
        <div id="tree-modal-lineage" class="tree-modal-lineage"></div>

        <div class="tree-modal-content">
            <img id="tree-modal-img" class="tree-modal-img" src="" alt="">

            <div class="tree-modal-copy">
                <h2 id="tree-modal-name"></h2>
                <h3 id="tree-modal-title"></h3>
                <p id="tree-modal-summary"></p>

                <a id="tree-modal-journal" class="tree-modal-link" href="#">
                    Read Journal Entry
                </a>
            </div>
        </div>
    </div>
</div>

<script src="scripts/family-registry.js"></script>
<script src="scripts/tree.js"></script>

</body>

</html>
